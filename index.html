<!DOCTYPE html>
<html>
<head>
	<title>Denice Minor &ndash; Email Signature</title>
	<meta charset="UTF-8" />
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Barlow:wght@300;400;500;600&amp;display=swap" rel="stylesheet" />
	<style type="text/css">body {
      margin: 0;
      padding: 30px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .sig {
      display: inline-table;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      font-family: 'Barlow', Arial, sans-serif;
    }

    .col-photo {
      vertical-align: bottom;
      padding: 0;
      width: 170px;
      min-width: 170px;
      background: #0a1f5c;
    }

    .col-photo img {
      display: block;
      width: 170px;
      height: auto;
    }

    .gold-bar {
      height: 4px;
      background: linear-gradient(90deg, #b8922a 0%, #e8c96a 50%, #b8922a 100%);
      font-size: 0;
    }

    .col-info {
      vertical-align: top;
      padding: 22px 26px 18px 26px;
      border-left: 4px solid #C8A84B;
      min-width: 260px;
      position: relative;
    }

    .col-info::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 28px 28px 0;
      border-color: transparent #0a1f5c transparent transparent;
    }

    .name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: #0a1f5c;
      letter-spacing: 0.3px;
      line-height: 1.15;
      margin: 0 0 4px 0;
    }

    .title {
      font-family: 'Barlow', Arial, sans-serif;
      font-size: 10.5px;
      font-weight: 600;
      color: #C8A84B;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 2px 0;
    }

    .dept {
      font-family: 'Barlow', Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      margin: 0 0 14px 0;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, #C8A84B 0%, #e8e8e8 70%);
      margin: 0 0 12px 0;
      border: none;
    }

    .phones {
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .phones td {
      padding: 2px 0;
    }

    .phone-label {
      font-family: 'Barlow', Arial, sans-serif;
      font-size: 9px;
      font-weight: 500;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding-right: 14px;
      white-space: nowrap;
    }

    .phone-num {
      font-family: 'Barlow', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #0a1f5c;
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    .phone-num:hover { color: #C8A84B; }

    .icons { border-collapse: collapse; }

    .icons td {
      padding-right: 10px;
      vertical-align: middle;
    }

    .icons td:last-child { padding-right: 0; }

    .icon-link img {
      width: 36px;
      height: 36px;
      display: block;
      opacity: 0.88;
    }

    .icon-link:hover img {
      opacity: 1;
    }

    .lax-strip {
      background: #0a1f5c;
      padding: 7px 26px;
    }

    .lax-strip span {
      font-family: 'Barlow', Arial, sans-serif;
      font-size: 9px;
      font-weight: 500;
      color: rgba(200,168,75,0.75);
      text-transform: uppercase;
      letter-spacing: 3px;
    }
	</style>
</head>
<body>
<table border="0" cellpadding="0" cellspacing="0" class="sig">
	<tbody>
		<tr><!-- Photo column -->
			<td class="col-photo"><img alt="Denice Minor" src="https://filedn.com/lVLsOock1BfXwnRWAjG1lob/dispatcher/Minor.png" />
			<div class="gold-bar">&nbsp;</div>
			</td>
			<!-- Info column -->
			<td class="col-info">
			<div class="name"><span style="font-size:24px;">Denice Minor</span></div>

			<div class="title">Senior Communications Operator</div>

			<div class="dept">Los Angeles Airport Police Dispatch</div>

			<hr class="divider" />
			<table border="0" cellpadding="0" cellspacing="0" class="phones">
				<tbody>
					<tr>
						<td class="phone-label">Call Center</td>
						<td><a class="phone-num" href="tel:3106464268">310-646-4268</a></td>
					</tr>
					<tr>
						<td class="phone-label">Direct</td>
						<td><a class="phone-num" href="tel:3106468580">310-646-8580</a></td>
					</tr>
				</tbody>
			</table>

			<table border="0" cellpadding="0" cellspacing="0" class="icons">
				<tbody>
					<tr>
						<td style="width: 50px;"><a class="icon-link" href="tel:3106468580"><img alt="Call" src="https://filedn.com/lVLsOock1BfXwnRWAjG1lob/LAAPOA/Sgt%20email%20Signature/Phone%20icon.png" style="height: 70px; width: 70px;" /></a></td>
						<td style="width: 50px;"><a href="https://www.flylax.com/"><img alt="" src="https://filedn.com/lVLsOock1BfXwnRWAjG1lob/LAAPOA/Sgt%20email%20Signature/LAX_Map_icon%20(2).png" style="width: 70px; height: 70px;" /></a></td>
						<td><a href="https://www.lawa.org/groups-and-divisions/airport-police/airport-police-recruitment"><img alt="" src="https://filedn.com/lVLsOock1BfXwnRWAjG1lob/LAAPOA/Sgt%20email%20Signature/Join_icon.png" style="width: 70px; height: 70px;" /></a></td>
					</tr>
				</tbody>
			</table>
			</td>
		</tr>
		<!-- Bottom strip -->
		<tr>
			<td class="lax-strip" colspan="2" style="text-align: center;"><span style="font-size:12px;">Los Angeles World Airports &nbsp;&middot;&nbsp; LAX Police</span></td>
		</tr>
	</tbody>
</table>

<p>&nbsp;
<p>&nbsp;</p>
</p>

<div>&nbsp;</div>
</body>
</html>
